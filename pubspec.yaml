  http: ^1.6.0
  logging: ^1.3.0
  uuid: ^4.5.2
  # path: ^1.9.0

dev_dependencies:
  build_runner: ^2.11.0
  lints: ^6.0.0
  mockito: ^5.6.3
  test: ^1.25.6
